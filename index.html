<script>
    // 1. 定义支持的语言 (去掉 export，直接在脚本内定义)
    const SUPPORTED_LOCALES = ['zh-CN', 'en-US'];
    const DEFAULT_LOCALE = 'en-US';

    function getUserLocale() {
        const path = window.location.pathname;
        const pathParts = path.split('/').filter(p => p !== ''); // 过滤掉空字符串

        // 检查当前 URL 是否已经包含语言标识 (避免死循环)
        // 例如：如果路径是 /zh-CN/index.html，parts[0] 就是 'zh-CN'
        if (pathParts.length > 0 && SUPPORTED_LOCALES.includes(pathParts[0])) {
            return null; 
        }

        // 优先级 1: LocalStorage (用户手动选择过)
        const storedLocale = localStorage.getItem('user_locale');
        if (storedLocale && SUPPORTED_LOCALES.includes(storedLocale)) {
            return storedLocale;
        }

        // 优先级 2: 浏览器设置
        const browserLang = navigator.language || navigator.userLanguage; 
        if (SUPPORTED_LOCALES.includes(browserLang)) {
            return browserLang;
        }
        
        // 优先级 3: 模糊匹配 (如 zh-TW -> zh-CN)
        const langCode = browserLang.split('-')[0]; 
        const matched = SUPPORTED_LOCALES.find(loc => loc.startsWith(langCode));
        if (matched) {
            return matched;
        }

        // 优先级 4: 默认值
        return DEFAULT_LOCALE;
    }

    function redirectBasedOnLocale() {
        const targetLocale = getUserLocale();
        
        if (!targetLocale) {
            // 已经在正确的语言目录下，无需操作
            // 可选：这里可以渲染实际内容，而不是跳转
            document.body.innerHTML = "<h1>Welcome!</h1>"; 
            return; 
        }

        // 构造目标路径
        // 假设目录结构是：/zh-CN/index.html
        // 当前是根目录 /index.html，我们要跳到 /zh-CN/index.html
        
        // 获取当前文件名 (通常是 index.html)
        const currentFileName = window.location.pathname.split('/').pop() || 'index.html';
        
        // 构造新 URL: http://ip/zh-CN/index.html
        const finalUrl = `/${targetLocale}/${currentFileName}`;

        console.log(`Redirecting to: ${finalUrl}`);

        // 【关键点】使用 location.href 进行硬跳转，这会触发浏览器重新请求新文件
        // 不要用 replaceState，因为那是单页应用(SPA)用的，你是多页面文件跳转
        window.location.href = finalUrl;
    }

    // 执行
    redirectBasedOnLocale();
</script>
